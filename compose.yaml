x-app-env: &app-env
  SQLITE_URL: sqlite:////data/tspw-graph.db
  DATA_ROOT: /data/uploads
  NEO4J_URI: bolt://neo4j:7687
  NEO4J_USER: neo4j
  NEO4J_PASSWORD: ${NEO4J_PASSWORD:-development-only}
  MODEL_PROFILES_JSON: '${MODEL_PROFILES_JSON:-[{"id":"fixed:test","provider":"fixed","base_url":"","model":"deterministic-test","api_key_env":"","timeout_seconds":10}]}'
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY:-}

services:
  neo4j:
    image: neo4j:5.26-community
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-development-only}
    ports:
      - "7474:7474"
      - "7687:7687"
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p '${NEO4J_PASSWORD:-development-only}' 'RETURN 1' >/dev/null 2>&1"]
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 10s
    volumes:
      - neo4j-data:/data

  api:
    build: ./apps/api
    environment:
      <<: *app-env
      AUTH_BOOTSTRAP_USERNAME: ${AUTH_BOOTSTRAP_USERNAME:-admin}
      AUTH_BOOTSTRAP_PASSWORD: ${AUTH_BOOTSTRAP_PASSWORD:-Pass@word1}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-false}
      AUTH_TRUST_FORWARDED_IP: "true"
    volumes:
      - app-data:/data
    depends_on:
      neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 2s
      timeout: 5s
      retries: 30

  worker:
    build: ./apps/api
    command: python -m app.worker.main
    environment:
      <<: *app-env
    volumes:
      - app-data:/data
    depends_on:
      neo4j:
        condition: service_healthy
      api:
        condition: service_healthy
    restart: unless-stopped

  web:
    build: ./apps/web
    ports:
      - "5173:80"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1/guide"]
      interval: 2s
      timeout: 5s
      retries: 30

volumes:
  neo4j-data:
  app-data:
